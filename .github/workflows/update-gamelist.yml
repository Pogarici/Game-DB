name: Update gamelist.json from Apps Script

on:
  workflow_dispatch: {}        # manual trigger from Actions UI
  schedule:
    - cron: '0 2 * * *'       # daily at 02:00 UTC (adjust as needed)

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch gamelist from Apps Script
        id: fetch
        run: |
          set -euo pipefail
          URL="https://script.google.com/macros/s/AKfycbx78biA9_LgLZy-PdpkEmiyBXd5q8fI9QJMCKc2yXqyb3wAL1KptkYpytig4q7uDzYFiw/exec"
          echo "Fetching $URL"
          curl -fsS "$URL" -o gamelist.json
          # Validate JSON; jq is available on ubuntu-latest
          jq . gamelist.json > /dev/null

      - name: Show diff (for logs)
        run: |
          git status --porcelain || true
          git --no-pager diff --no-index -- gamelist.json gamelist.json || true

      - name: Commit gamelist.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gamelist.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update gamelist.json from Apps Script: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
