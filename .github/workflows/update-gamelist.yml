name: Debug Update gamelist.json from Apps Script

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug fetch (verbose)
        id: debug_fetch
        run: |
          set -euo pipefail
          URL="https://script.google.com/macros/s/AKfycbx78biA9_LgLZy-PdpkEmiyBXd5q8fI9QJMCKc2yXqyb3wAL1KptkYpytig4q7uDzYFiw/exec"
          echo "Fetching: $URL"
          TMP=$(mktemp)
          curl -L -v -sS -D "$TMP.headers" -o "$TMP.body" "$URL" || true
          echo "---- RESPONSE HEADERS ----"
          sed -n '1,200p' "$TMP.headers" || true
          echo "---- RESPONSE BODY PREVIEW (first 1000 bytes) ----"
          head -c 1000 "$TMP.body" || true
          echo
          echo "---- BODY TYPE INFO ----"
          file "$TMP.body" || true
          echo "---- BODY SIZE ----"
          wc -c "$TMP.body" || true
          HTTP_STATUS=$(grep -i '^HTTP/' "$TMP.headers" | tail -n1 | awk '{print $2}' || true)
          echo "HTTP status detected in headers: ${HTTP_STATUS:-<none>}"
          mv "$TMP.body" gamelist.json
          rm -f "$TMP.headers"

      - name: Validate JSON
        run: |
          set -euo pipefail
          if ! jq . gamelist.json > /dev/null 2>&1; then
            echo "Invalid JSON. Showing first 1000 chars:"
            head -c 1000 gamelist.json || true
            exit 6
          fi
          echo "JSON validated."

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gamelist.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update gamelist.json from Apps Script: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin main
