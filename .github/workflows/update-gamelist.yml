name: Update gamelist.json from Apps Script

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch gamelist from Apps Script (with diagnostics)
        id: fetch
        run: |
          set -euo pipefail
          URL="https://script.google.com/macros/s/AKfycbx78biA9_LgLZy-PdpkEmiyBXd5q8fI9QJMCKc2yXqyb3wAL1KptkYpytig4q7uDzYFiw/exec"
          echo "Fetching $URL"
          # Fetch and capture HTTP status and body
          HTTP_OUT=$(mktemp)
          HTTP_STATUS=$(curl -sS -w "%{http_code}" -o "$HTTP_OUT" "$URL" || true)
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Fetch failed. Response body:"
            sed -n '1,200p' "$HTTP_OUT" || true
            echo "---- end response ----"
            rm -f "$HTTP_OUT"
            exit 5
          fi
          mv "$HTTP_OUT" gamelist.json
          echo "Fetched $(wc -c < gamelist.json) bytes."

      - name: Validate JSON
        run: |
          set -euo pipefail
          if ! jq . gamelist.json > /dev/null 2>&1; then
            echo "Invalid JSON in gamelist.json. Showing first 200 chars:"
            head -c 200 gamelist.json || true
            exit 6
          fi
          echo "JSON validated."

      - name: Show file size and preview
        run: |
          echo "Size: $(wc -c < gamelist.json) bytes"
          echo "Preview (first 200 chars):"
          head -c 200 gamelist.json || true
          echo
          echo "Preview (first 5 lines):"
          head -n 5 gamelist.json || true

      - name: Commit gamelist.json if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gamelist.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update gamelist.json from Apps Script: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
