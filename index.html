<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Game Library</title>
<style>
  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    color:white;
    padding:20px;
  }

  .header-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
  }
  h1{margin:0; font-size:22px; line-height:1;}
  .total-badge{
      color:#ddd;
      background:transparent;
      font-size:22px;
      font-weight:700;
  }

  .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:10px;
      margin:14px 0 20px 0;
  }

  .stat{
      background:#1c1c1c;
      padding:12px;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
      transition:0.2s;
      user-select:none;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
      justify-content:center;
  }

  .stat:hover{ transform:scale(1.03); }
  .stat.active{ background:#5865f2; }

  .stat .plat-name{font-weight:700;}
  .stat .plat-counts{font-size:18px;color:#ccc;font-weight:700;}

  .filters{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
  }

  input{
      background:#1c1c1c;
      border:none;
      color:white;
      padding:10px;
      border-radius:8px;
      flex:1;
      min-width:200px;
  }

  .view-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:12px;
  }

  .view-left{ display:flex; gap:8px; align-items:center; }
  .view-right{ display:flex; gap:8px; align-items:center; }

  button{
      background:#222;
      border:none;
      padding:10px 15px;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
  }
  button.active{background:#5865f2;}
  button#updateBtn{ background:#2a2a2a; font-weight:700; }

  .grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:12px;
  }
  @media(max-width:1400px){ .grid{grid-template-columns:repeat(4,1fr);} }
  @media(max-width:900px){ .grid{grid-template-columns:repeat(2,1fr);} }

  .card{
      background:#1a1a1a;
      border-radius:12px;
      overflow:hidden;
      transition:0.25s;
      cursor:pointer;
      display:flex;
      flex-direction:column;
  }
  .card:hover{
      transform:scale(1.04);
      box-shadow:0 0 20px rgba(88,101,242,0.4);
  }

  .cover{
      height:170px;
      background-size:cover;
      background-position:center;
  }

  .title{ font-size:13px; font-weight:bold; padding:8px; }
  .platforms{ padding:0 8px 6px; font-size:11px; color:#bbb; }
  .status{ font-size:11px; padding:0 8px 10px; }
  .finished{color:#4ade80;}
  .progress{color:#facc15;}
  .none{color:#777;}

  table{
      width:100%;
      border-collapse:collapse;
      display:none;
      margin-top:10px;
  }
  th,td{
      padding:10px;
      border-bottom:1px solid #333;
      text-align:left;
      vertical-align:middle;
  }
  th{ background:#1c1c1c; font-weight:600; }

  .row-highlight{
      animation: highlightFlash 2.5s ease-in-out;
      box-shadow:0 0 18px rgba(88,101,242,0.25) inset;
      background: linear-gradient(90deg, rgba(88,101,242,0.06), rgba(88,101,242,0.02));
  }
  @keyframes highlightFlash{
      0%{ background: rgba(88,101,242,0.12); }
      50%{ background: rgba(88,101,242,0.04); }
      100%{ background: rgba(88,101,242,0.00); }
  }

  @media(max-width:700px){
      table, thead, tbody, th, td, tr { display:block; }
      thead { display:none; }
      tr { margin-bottom:12px; border-bottom:1px solid #333; padding-bottom:8px; }
      td { padding:6px 0; }
      td::before { font-weight:600; display:block; color:#888; margin-bottom:4px; }
      td[data-label="Game"]::before{ content: "Game"; }
      td[data-label="Pogarici"]::before{ content: "Pogarici"; }
      td[data-label="Batman"]::before{ content: "Batman"; }
      td[data-label="Status"]::before{ content: "Status"; }
      td[data-label="Date Added"]::before{ content: "Date Added"; }
  }

.sticky-top{
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #0f0f0f;
  padding-top: 10px;
  padding-bottom: 10px;
}

.sticky-top::after{
  content:"";
  display:block;
  height:1px;
  background:#222;
  margin-top:10px;
}
/* ✅ Force sticky table header */
table thead th {
  position: sticky;
  top: 230px; /* adjust depending on your sticky header height */
  z-index: 1001;
  background: #1c1c1c;
}

/* Needed to ensure proper stacking */
table thead {
  position: sticky;
  z-index: 1000;
}

</style>
</head>
<body>

<div class="sticky-top">
  <div class="header-row">
    <h1>🎮 Game Library</h1>
    <div class="total-badge" id="totalBadge">Loading...</div>
  </div>

  <div class="stats" id="statsContainer">
    <div class="stat" data-platform="steam">
      <div class="plat-name">STEAM</div>
      <div class="plat-counts" id="steamCounts">0</div>
    </div>
    <div class="stat" data-platform="epic">
      <div class="plat-name">EPIC</div>
      <div class="plat-counts" id="epicCounts">0</div>
    </div>
    <div class="stat" data-platform="gog">
      <div class="plat-name">GOG</div>
      <div class="plat-counts" id="gogCounts">0</div>
    </div>
    <div class="stat" data-platform="ubisoft">
      <div class="plat-name">UBISOFT</div>
      <div class="plat-counts" id="ubisoftCounts">0</div>
    </div>
    <div class="stat" data-platform="ps4">
      <div class="plat-name">PS4</div>
      <div class="plat-counts" id="ps4Counts">0</div>
    </div>
  </div>

  <div class="filters">
    <input id="search" placeholder="Search games...">
  </div>

  <div class="view-row">
    <div class="view-left">
      <button id="gridBtn" class="active">Grid</button>
      <button id="tableBtn">Table</button>
    </div>

    <div class="view-right">
      <button id="pogarBtn">Pogarici</button>
      <button id="batmanBtn">Batman</button>
      <button id="updateBtn">Update Library</button>
    </div>
  </div>
</div>

<br>

<div class="grid" id="grid"></div>

<table id="table">
<thead>
<tr>
<th>Game</th>
<th>Pogarici</th>
<th>Batman</th>
<th>Status</th>
<th>Date Added</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
/* Platform mapping */
const PLATFORM_KEYS = [
  { key: "STEAM", slug: "steam", name: "Steam" },
  { key: "EPIC", slug: "epic", name: "Epic" },
  { key: "GOG", slug: "gog", name: "GOG" },
  { key: "UBISOFT", slug: "ubisoft", name: "UBISOFT" },
  { key: "PS4", slug: "ps4", name: "PS4" }
];

/* DOM refs */
const grid = document.getElementById("grid");
const tbody = document.getElementById("tbody");
const search = document.getElementById("search");
const totalBadge = document.getElementById("totalBadge");
const table = document.getElementById("table");

const pogarBtn = document.getElementById("pogarBtn");
const batmanBtn = document.getElementById("batmanBtn");
const updateBtn = document.getElementById("updateBtn");

const gridBtn = document.getElementById("gridBtn");
const tableBtn = document.getElementById("tableBtn");

/* State */
let games = [];
let fullTotal = 0;
let selectedPlatform = null;
let accountFilter = null;
let lastHighlightedRowId = null;

/* Indexes for fast filtering */
let platformIndex = {};
let accountIndex = { pogarici: [], batman: [] };
let nameIndex = [];

/* Utility: normalize boolean-like strings */
function truthy(val){
  if(val === true || val === false) return val;
  if(!val && val !== 0) return false;
  const s = String(val).trim().toLowerCase();
  return s === "true" || s === "yes" || s === "1";
}

/* Convert a single JSON row into internal game object */
function convertRow(row){
  const name = row["Game"] || row["game"] || row["Name"] || row["name"] || "Unknown";
  const pog = truthy(row["Pogarici"]);
  const bat = truthy(row["Batman"]);
  const status = row["Status"] || row["status"] || "";
  const date = row["DATE OF ENTRY"] || row["Date"] || row["date"] || "";

  const pogariciPlatforms = [];
  const batmanPlatforms = [];
  const platformsSet = new Set();

  PLATFORM_KEYS.forEach(pk=>{
    const keyP = `${pk.key} (P)`;
    const keyB = `${pk.key} (B)`;
    const altKeyP = `${pk.key} (p)`;
    const altKeyB = `${pk.key} (b)`;

    if(row.hasOwnProperty(keyP) && truthy(row[keyP])){
      pogariciPlatforms.push(pk.slug);
      platformsSet.add(pk.slug);
    } else if(row.hasOwnProperty(altKeyP) && truthy(row[altKeyP])){
      pogariciPlatforms.push(pk.slug);
      platformsSet.add(pk.slug);
    }

    if(row.hasOwnProperty(keyB) && truthy(row[keyB])){
      batmanPlatforms.push(pk.slug);
      platformsSet.add(pk.slug);
    } else if(row.hasOwnProperty(altKeyB) && truthy(row[altKeyB])){
      batmanPlatforms.push(pk.slug);
      platformsSet.add(pk.slug);
    }
  });

  const platforms = Array.from(platformsSet);
  const cover = row["cover"] || row["Cover"] || "";

  return {
    name,
    cover,
    platforms,
    pogarici: pog,
    batman: bat,
    pogariciPlatforms,
    batmanPlatforms,
    status,
    date
  };
}

/* Build indexes for fast filtering */
function buildIndexes(){
  platformIndex = {};
  PLATFORM_KEYS.forEach(pk => platformIndex[pk.slug] = []);
  accountIndex = { pogarici: [], batman: [] };
  nameIndex = [];

  for(let i=0;i<games.length;i++){
    const g = games[i];
    PLATFORM_KEYS.forEach(pk=>{
      if((g.pogariciPlatforms && g.pogariciPlatforms.includes(pk.slug)) ||
         (g.batmanPlatforms && g.batmanPlatforms.includes(pk.slug)) ||
         (g.platforms && g.platforms.includes(pk.slug))){
        platformIndex[pk.slug].push(i);
      }
    });

    if(g.pogarici || (g.pogariciPlatforms && g.pogariciPlatforms.length>0)) accountIndex.pogarici.push(i);
    if(g.batman || (g.batmanPlatforms && g.batmanPlatforms.length>0)) accountIndex.batman.push(i);

    nameIndex.push(String(g.name || "").toLowerCase());
  }
}

/* Update platform card counts */
function updatePlatformCounts(){
  const counts = {};
  PLATFORM_KEYS.forEach(pk=> counts[pk.slug] = 0);

  PLATFORM_KEYS.forEach(pk=>{
    const arr = platformIndex[pk.slug] || [];
    counts[pk.slug] = arr.length;
  });

  document.getElementById("steamCounts").textContent = `${counts.steam}`;
  document.getElementById("epicCounts").textContent  = `${counts.epic}`;
  document.getElementById("gogCounts").textContent   = `${counts.gog}`;
  document.getElementById("ubisoftCounts").textContent = `${counts.ubisoft}`;
  document.getElementById("ps4Counts").textContent   = `${counts.ps4}`;
}

/* Helper: intersection of two arrays */
function intersectArrays(a, b){
  if(!a || !b) return [];
  if(a.length === 0 || b.length === 0) return [];
  if(a.length > b.length) [a,b] = [b,a];
  const setB = new Set(b);
  const res = [];
  for(const v of a) if(setB.has(v)) res.push(v);
  return res;
}

/* FILTER LOGIC */
function filterGames(){
  let candidateIds = Array.from({length: games.length}, (_,i)=>i);

  if(selectedPlatform){
    candidateIds = platformIndex[selectedPlatform] ? platformIndex[selectedPlatform].slice() : [];
  }

  if(accountFilter === "pogarici"){
    candidateIds = intersectArrays(candidateIds, accountIndex.pogarici);
  } else if(accountFilter === "batman"){
    candidateIds = intersectArrays(candidateIds, accountIndex.batman);
  }

  const q = (search.value || "").trim().toLowerCase();
  if(q){
    const filtered = [];
    for(const id of candidateIds){
      if(nameIndex[id].includes(q)) filtered.push(id);
    }
    candidateIds = filtered;
  }

  return candidateIds.map(id => games[id]);
}

/* GRID RENDER */
function renderGrid(list){
  grid.innerHTML = "";
  if(!list || list.length === 0) return;

  const frag = document.createDocumentFragment();
  for(const g of list){
    const originalIndex = games.indexOf(g);
    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("data-index", originalIndex);
    card.setAttribute("role","button");
    card.setAttribute("tabindex","0");
    card.setAttribute("aria-label", `Open ${g.name} in table`);

    const cover = document.createElement("div");
    cover.className = "cover";
    cover.style.backgroundImage = `url('${g.cover || "https://via.placeholder.com/300x170?text=No+Cover"}')`;

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = g.name;

    const plats = document.createElement("div");
    plats.className = "platforms";
    plats.textContent = (g.platforms || []).map(p=>platformDisplayName(p)).join(" | ").toUpperCase();

    const status = document.createElement("div");
    status.className = "status " + (g.status==="Finished"?"finished":g.status==="In Progress"?"progress":"none");
    status.textContent = g.status || "";

    card.appendChild(cover);
    card.appendChild(title);
    card.appendChild(plats);
    card.appendChild(status);

    frag.appendChild(card);
  }
  grid.appendChild(frag);

  grid.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", onCardClick);
    card.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" || e.key === " ") onCardClick.call(card, e);
    });
  });
}

/* TABLE RENDER */
function renderTable(list){
  tbody.innerHTML = "";
  if(!list || list.length === 0) return;

  const frag = document.createDocumentFragment();
  for(const g of list){
    const originalIndex = games.indexOf(g);
    const row = document.createElement("tr");
    row.id = `row-${originalIndex}`;

    const tdGame = document.createElement("td");
    tdGame.setAttribute("data-label","Game");
    tdGame.textContent = g.name;

    const pogPlatforms = (g.pogariciPlatforms && g.pogariciPlatforms.length)
      ? g.pogariciPlatforms.map(p=>platformDisplayName(p)).join(" | ")
      : "-";

    const batPlatforms = (g.batmanPlatforms && g.batmanPlatforms.length)
      ? g.batmanPlatforms.map(p=>platformDisplayName(p)).join(" | ")
      : "-";

    const tdPog = document.createElement("td");
    tdPog.setAttribute("data-label","Pogarici");
    tdPog.textContent = pogPlatforms;

    const tdBat = document.createElement("td");
    tdBat.setAttribute("data-label","Batman");
    tdBat.textContent = batPlatforms;

    const tdStatus = document.createElement("td");
    tdStatus.setAttribute("data-label","Status");
    tdStatus.className = g.status==="Finished"?"finished":g.status==="In Progress"?"progress":"none";
    tdStatus.textContent = g.status || "";

    const tdDate = document.createElement("td");
    tdDate.setAttribute("data-label","Date Added");
    tdDate.textContent = g.date || "";

    row.appendChild(tdGame);
    row.appendChild(tdPog);
    row.appendChild(tdBat);
    row.appendChild(tdStatus);
    row.appendChild(tdDate);

    frag.appendChild(row);
  }
  tbody.appendChild(frag);
}

/* MASTER RENDER */
function render(){
  const list = filterGames();
  renderGrid(list);
  renderTable(list);
}

/* Card click handler */
function onCardClick(e){
  const idx = Number(this.dataset.index);
  if(Number.isNaN(idx)) return;
  showTableView();

  setTimeout(()=>{
    const rowId = `row-${idx}`;
    const row = document.getElementById(rowId);
    if(row){
      if(lastHighlightedRowId){
        const prev = document.getElementById(lastHighlightedRowId);
        if(prev) prev.classList.remove("row-highlight");
      }
      row.classList.add("row-highlight");
      lastHighlightedRowId = rowId;
      row.scrollIntoView({behavior:"smooth", block:"center"});
      setTimeout(()=>{ row.classList.remove("row-highlight"); lastHighlightedRowId = null; }, 3000);
    }
  }, 120);
}

/* Helpers */
function platformDisplayName(slug){
  const found = PLATFORM_KEYS.find(p=>p.slug === slug);
  return found ? found.name : slug;
}

/* UI: platform card click */
document.querySelectorAll(".stat").forEach(el=>{
  el.onclick = ()=>{
    const p = el.dataset.platform;
    if(selectedPlatform === p){
      selectedPlatform = null;
      document.querySelectorAll(".stat").forEach(x=>x.classList.remove("active"));
    } else {
      selectedPlatform = p;
      document.querySelectorAll(".stat").forEach(x=>x.classList.remove("active"));
      el.classList.add("active");
    }
    render();
  };
});

/* Account filter buttons */
pogarBtn.addEventListener("click", ()=>{
  if(accountFilter === "pogarici"){
    accountFilter = null;
    pogarBtn.classList.remove("active");
  } else {
    accountFilter = "pogarici";
    pogarBtn.classList.add("active");
    batmanBtn.classList.remove("active");
  }
  render();
});
batmanBtn.addEventListener("click", ()=>{
  if(accountFilter === "batman"){
    accountFilter = null;
    batmanBtn.classList.remove("active");
  } else {
    accountFilter = "batman";
    batmanBtn.classList.add("active");
    pogarBtn.classList.remove("active");
  }
  render();
});

/* View toggle */
gridBtn.onclick = showGridView;
tableBtn.onclick = showTableView;
function showGridView(){
  grid.style.display = "grid";
  table.style.display = "none";
  gridBtn.classList.add("active");
  tableBtn.classList.remove("active");
}
function showTableView(){
  grid.style.display = "none";
  table.style.display = "table";
  tableBtn.classList.add("active");
  gridBtn.classList.remove("active");
}

/* Search input (debounced) */
let searchTimer = null;
search.addEventListener("input", ()=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{ render(); }, 160);
});

/* Load data from gamelist.json */
async function loadGameList(){
  try{
    console.log("Fetching gamelist.json...");
    const resp = await fetch("./gamelist.json?t=" + Date.now(), { cache: "no-store" });
    if(!resp.ok){
      throw new Error(`HTTP ${resp.status}`);
    }
    const data = await resp.json();
    if(!Array.isArray(data)){
      throw new Error("Invalid JSON (expected array)");
    }

    games = data.map(convertRow);
    fullTotal = games.length;
    totalBadge.textContent = `${fullTotal} Games`;
    buildIndexes();
    updatePlatformCounts();
    render();

    console.log(`Loaded ${fullTotal} games successfully`);
    return true;
  }catch(err){
    console.error("Load failed", err);
    totalBadge.textContent = "Load Error";
    return false;
  }
}

/* Trigger GitHub Actions workflow */
async function triggerWorkflow(){
  const PAT = localStorage.getItem("github_pat");
  if(!PAT){
    updateBtn.textContent = "Setup Required";
    const token = prompt("Enter your GitHub Personal Access Token (with 'repo' and 'workflow' scopes):");
    if(!token){
      updateBtn.textContent = "Update Library";
      return false;
    }
    localStorage.setItem("github_pat", token);
  }

  try{
    const token = localStorage.getItem("github_pat");
    const owner = "Pogarici";
    const repo = "Game-DB";
    const workflow = "update-gamelist.yml";
    const branch = "main";

    const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflow}/dispatches`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${token}`,
        "Content-Type": "application/json",
        "Accept": "application/vnd.github.v3+json"
      },
      body: JSON.stringify({
        ref: branch
      })
    });

    if(!response.ok){
      const errorData = await response.text();
      console.error("Workflow trigger failed:", response.status, errorData);
      throw new Error(`HTTP ${response.status}`);
    }

    console.log("Workflow triggered successfully!");
    return true;
  }catch(err){
    console.error("Trigger failed", err);
    return false;
  }
}

/* Manual update button */
updateBtn.addEventListener("click", async ()=>{
  updateBtn.disabled = true;
  updateBtn.textContent = "Triggering...";
  
  const workflowSuccess = await triggerWorkflow();
  
  if(workflowSuccess){
    updateBtn.textContent = "Workflow Started ✓";
    
    // Wait 2 seconds before starting countdown
    setTimeout(()=>{
      let countdown = 50;
      updateBtn.textContent = countdown;
      
      const countdownInterval = setInterval(()=>{
        countdown--;
        updateBtn.textContent = countdown;
        
        if(countdown <= 0){
          clearInterval(countdownInterval);
          
          // Show "Updated ✓" and reload data
          updateBtn.textContent = "Updated ✓";
          loadGameList();
          
          // Keep "Updated ✓" for 2.5 seconds, then auto-refresh the page
          setTimeout(()=>{
            updateBtn.textContent = "Update Library";
            updateBtn.disabled = false;
            // Auto-refresh the entire page
            location.reload();
          }, 2500);
        }
      }, 1000);
    }, 2000);
  } else {
    updateBtn.textContent = "Trigger Failed";
    setTimeout(()=>{ 
      updateBtn.textContent = "Update Library"; 
      updateBtn.disabled = false; 
    }, 1200);
  }
});

/* Load on page load */
window.addEventListener("DOMContentLoaded", loadGameList);

</script>
</body>
</html>
