<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Game Library</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}
@media(max-width:1200px){ .grid{grid-template-columns:repeat(3,1fr);} }

.card{
  background:#1a1a1a;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.cover{
  height:170px;
  background-size:cover;
  background-position:center;
  position:relative;
}

.title{ padding:8px; font-size:13px; }

</style>
</head>

<body>

<h2>🎮 Game Library (TEST)</h2>

<div class="grid" id="grid"></div>

<script>

// ✅ TEST DATA (replace with your JSON later)
const games = [
  {
    name:"A Plague Tale: Innocence",
    youtube:"https://www.youtube.com/watch?v=bDBOxetPQKw"
  }
];

// ✅ RENDER
function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  games.forEach(g => {

    const card = document.createElement("div");
    card.className = "card";

    const cover = document.createElement("div");
    cover.className = "cover";

    let vid = null;

    if(g.youtube){
      const match = g.youtube.match(/(?:v=|\\.be\\/)([^&]+)/);
      vid = match ? match[1] : null;
    }

    if(vid){
      cover.style.backgroundImage = `url('https://img.youtube.com/vi/${vid}/hqdefault.jpg')`;
    }

    // ✅ PLAY BUTTON
    if(vid){

      const play = document.createElement("div");
      play.innerHTML = "▶";

      play.style.position = "absolute";
      play.style.top = "50%";
      play.style.left = "50%";
      play.style.transform = "translate(-50%, -50%)";
      play.style.fontSize = "36px";
      play.style.cursor = "pointer";

      play.addEventListener("click", (e)=>{
        e.stopPropagation();

        // remove all videos
        document.querySelectorAll(".cover").forEach(c=>{
          c.innerHTML="";
        });

        play.remove();

        // ✅ inject VALID iframe
        cover.innerHTML = `
          <iframe
            width="100%"
            height="100%"
            src="https://www.youtube.com/embed/${vid}?autoplay=1("iframe");

        // ✅ pause on click (NO RELOAD)
        cover.onclick = (ev)=>{
          ev.stopPropagation();

          iframe.contentWindow.postMessage(JSON.stringify({
            event:"command",
            func:"pauseVideo"
          }), "*");
        };
      });

      cover.appendChild(play);
    }

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = g.name;

    card.appendChild(cover);
    card.appendChild(title);

    grid.appendChild(card);
  });
}

renderGrid();

</script>
</body>
</html>
