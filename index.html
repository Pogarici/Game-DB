<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Library</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f0f0f;
    color:white;
    font-family:Segoe UI,Arial,sans-serif;
}

h1{ margin:0 0 10px 0; }

.sticky-bar{
    position:sticky;
    top:0;
    z-index:1000;
    background:#0f0f0f;
    padding-bottom:10px;
}

.tools{
    display:flex;
    gap:10px;
    margin:10px 0;
}

input, select{
    padding:10px;
    border-radius:8px;
    border:none;
    background:#1e1e1e;
    color:white;
}

.controls{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.left-controls,
.right-controls{
    display:flex;
    gap:10px;
}

.btn{
    background:#1e1e1e;
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
}

.btn.active{
    background:#5865f2;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
}

.stat{
    background:#1c1c1c;
    border-radius:10px;
    padding:15px;
    text-align:center;
    cursor:pointer;
}

.stat.active{ background:#5865f2; }

.grid{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:12px;
    margin-top:20px;
}

@media(max-width:1600px){
    .grid{grid-template-columns:repeat(6,1fr);}
}
@media(max-width:1200px){
    .grid{grid-template-columns:repeat(4,1fr);}
}
@media(max-width:800px){
    .grid{grid-template-columns:repeat(2,1fr);}
}

.card{
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    transition:.2s;
}

.card:hover{ transform:translateY(-3px); }

.cover{
    height:140px;
    background:#222;
    background-size:cover;
    background-position:center;
}

.title{ font-weight:bold; padding:10px; }

.accounts,.platforms{
    padding:0 10px;
    font-size:12px;
    color:#bbb;
    margin-bottom:6px;
}

.status{
    padding:0 10px 12px;
    font-size:12px;
    font-weight:bold;
}

.finished{ color:#4ade80; }
.progress{ color:#facc15; }
.none{ color:white; }

table{
    width:100%;
    border-collapse:collapse;
    display:none;
    margin-top:20px;
}

th{ background:#1c1c1c; }

th,td{
    padding:10px;
    border-bottom:1px solid #333;
    text-align:left;
}

</style>
</head>

<body>

<h1>🎮 Game Library</h1>

<div class="sticky-bar">

    <div class="stats" id="stats"></div>

    <div class="tools">
        <input type="text" id="search" placeholder="Search game...">

        <select id="sort">
            <option value="">Sort</option>
            <option value="az">A‑Z ↑</option>
            <option value="za">Z‑A ↓</option>
            <option value="dateAsc">Date ↑</option>
            <option value="dateDesc">Date ↓</option>
        </select>
    </div>

    <div class="controls">
        <div class="left-controls">
            <button id="gridBtn" class="btn active">Grid</button>
            <button id="tableBtn" class="btn">Table</button>
        </div>

        <div class="right-controls">
            <button id="pogariciBtn" class="btn">POGARICI</button>
            <button id="batmanBtn" class="btn">BATMAN</button>
        </div>
    </div>

</div>

<div id="grid" class="grid"></div>

<table id="table">
<thead>
<tr>
<th>Game</th>
<th>Account</th>
<th>Platform</th>
<th>Status</th>
<th>Date Added</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

const API_URL = "./games.json";

/* ✅ CACHE SETTINGS */
const CACHE_KEY = "gameLibraryCache";
const CACHE_TIME = 24 * 60 * 60 * 1000; // 24h

let games = [];
let selectedPlatform = null;
let selectedAccount = null;

const grid = document.getElementById("grid");
const table = document.getElementById("table");
const tbody = document.getElementById("tbody");
const stats = document.getElementById("stats");

const pogariciBtn = document.getElementById("pogariciBtn");
const batmanBtn = document.getElementById("batmanBtn");

function isTrue(v){
    return v === true || v === "TRUE" || v === "true";
}

function formatDate(value){
    if(!value) return "-";
    const d = new Date(value);
    if(isNaN(d)) return value;

    const day = String(d.getDate()).padStart(2,'0');
    const month = String(d.getMonth()+1).padStart(2,'0');
    const year = d.getFullYear();

    return `${day}.${month}.${year}`;
}

async function getCover(name){
    try{
        const res = await fetch(`https://api.rawg.io/api/games?search=${encodeURIComponent(name)}`);
        const data = await res.json();

        if(data.results && data.results.length > 0){
            return data.results[0].background_image;
        }
    }catch{}
    return "";
}

/* ✅ CACHED LOAD */
async function loadData(){

    const cached = localStorage.getItem(CACHE_KEY);

    if(cached){
        const parsed = JSON.parse(cached);

        if(Date.now() - parsed.timestamp < CACHE_TIME){
            games = parsed.data;
            renderStats();
            render();
            console.log("✅ Loaded from cache");
            return;
        }
    }

    console.log("⏳ Fetching fresh data...");

    const res = await fetch(API_URL);
    const data = await res.json();

    games = await Promise.all(data.map(async r=>{

        let accounts = [];
        if(isTrue(r["Pogarici"])) accounts.push("Pogarici");
        if(isTrue(r["Batman"])) accounts.push("Batman");

        let platforms = [];

        if(isTrue(r["EPIC (P)"]) || isTrue(r["EPIC (B)"])) platforms.push("EPIC");
        if(isTrue(r["STEAM (P)"]) || isTrue(r["STEAM (B)"])) platforms.push("STEAM");
        if(isTrue(r["GOG (P)"]) || isTrue(r["GOG (B)"])) platforms.push("GOG");
        if(isTrue(r["UBISOFT (P)"]) || isTrue(r["UBISOFT (B)"])) platforms.push("UBISOFT");
        if(isTrue(r["PS4 (P)"])) platforms.push("PS4");

        return {
            game:r["Game"] || "-",
            accounts,
            platforms,
            status:r["Status"] || "-",
            date:formatDate(r["DATE OF ENTRY"]),
            rawDate:new Date(r["DATE OF ENTRY"]),
            cover: await getCover(r["Game"])
        };

    }));

    localStorage.setItem(CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        data: games
    }));

    console.log("✅ Cache saved");

    renderStats();
    render();
}

function renderStats(){

    const counts = {EPIC:0,STEAM:0,GOG:0,UBISOFT:0,PS4:0};

    games.forEach(g=>{
        g.platforms.forEach(p=> counts[p]++);
    });

    stats.innerHTML = "";

    Object.keys(counts).forEach(platform=>{
        const active = selectedPlatform === platform ? "active" : "";
        stats.innerHTML += `
        <div class="stat ${active}" onclick="filterPlatform('${platform}')">
            ${platform}<br><small>${counts[platform]}</small>
        </div>`;
    });
}

function filterPlatform(platform){
    selectedPlatform = selectedPlatform === platform ? null : platform;
    renderStats();
    render();
}

function filterAccount(account){
    selectedAccount = selectedAccount === account ? null : account;

    pogariciBtn.classList.toggle("active", selectedAccount === "Pogarici");
    batmanBtn.classList.toggle("active", selectedAccount === "Batman");

    render();
}

function getFiltered(){

    let list = [...games];

    const q = document.getElementById("search").value.toLowerCase();
    if(q){
        list = list.filter(g=> g.game.toLowerCase().includes(q));
    }

    if(selectedPlatform){
        list = list.filter(g=> g.platforms.includes(selectedPlatform));
    }

    if(selectedAccount){
        list = list.filter(g=> g.accounts.includes(selectedAccount));
    }

    const sort = document.getElementById("sort").value;

    if(sort === "az") list.sort((a,b)=> a.game.localeCompare(b.game));
    if(sort === "za") list.sort((a,b)=> b.game.localeCompare(a.game));
    if(sort === "dateAsc") list.sort((a,b)=> a.rawDate - b.rawDate);
    if(sort === "dateDesc") list.sort((a,b)=> b.rawDate - a.rawDate);

    return list;
}

function renderGrid(list){
    grid.innerHTML = "";
    list.forEach(g=>{
        let cls = "none";
        if(g.status === "Finished") cls = "finished";
        if(g.status === "In Progress") cls = "progress";

        grid.innerHTML += `
        <div class="card">
            <div class="cover" style="background-image:url('${g.cover || ""}')"></div>
            <div class="title">${g.game}</div>
            <div class="accounts">${g.accounts.join(" | ") || "-"}</div>
            <div class="platforms">${g.platforms.join(" | ") || "-"}</div>
            <div class="status ${cls}">${g.status}</div>
        </div>`;
    });
}

function renderTable(list){
    tbody.innerHTML = "";
    list.forEach(g=>{
        tbody.innerHTML += `
        <tr>
            <td>${g.game}</td>
            <td>${g.accounts.join(" | ") || "-"}</td>
            <td>${g.platforms.join(" | ") || "-"}</td>
            <td>${g.status}</td>
            <td>${g.date}</td>
        </tr>`;
    });
}

function render(){
    const list = getFiltered();
    renderGrid(list);
    renderTable(list);
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("sort").addEventListener("change",render);

pogariciBtn.addEventListener("click",()=> filterAccount("Pogarici"));
batmanBtn.addEventListener("click",()=> filterAccount("Batman"));

gridBtn.addEventListener("click",()=>{
    grid.style.display="grid";
    table.style.display="none";
    gridBtn.classList.add("active");
    tableBtn.classList.remove("active");
});

tableBtn.addEventListener("click",()=>{
    grid.style.display="none";
    table.style.display="table";
    tableBtn.classList.add("active");
    gridBtn.classList.remove("active");
});

loadData();

</script>

</body>
</html>
